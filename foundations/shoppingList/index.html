<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping list example</title>
    <style>
      li {
        margin-bottom: 10px;
      }

      li button {
        font-size: 12px;
        margin-left: 20px;
        color: #666;
      }
    </style>
  </head>
  <body>

    <h1>My shopping list</h1>

    <form>
      <label for="item">Enter a new item:</label>
      <input type="text" name="item" id="item">
      <button>Add item</button>
    </form>

    <ul>

    </ul>

    <script>
      //2. Make Three References to ul, button, and input
      const ul = document.querySelector("ul");
      const input = document.querySelector("input");
      const addItemBtn = document.querySelector("button");
      let inputValue = "";

      //3. Create a button in response to the button being clicked
      addItemBtn.addEventListener("click", (event) => {
        //4. Call Prevent Default
        event.preventDefault();
        //5. Store current value in var
        inputValue = input.value; //Not sure about thsi one?
        //6. Clear the input element by setting = to ""
        input.value = "";

        //7. Create 3 new vars
        //Might be confusing it, I think I may need document.createElement each one, but we'll see
        const span = document.createElement("span");
        const btn = document.createElement("button");
        const li = document.createElement("li");

        //8. Append span and button as children to li
        li.appendChild(span);
        li.appendChild(btn);

        //9. Set the text content of the span to the input value you saved earlier, and set the text content of the button to Delete
        span.textContent = inputValue;
        btn.textContent = "Delete";

        //10. Append the list item to the list
        ul.appendChild(li);

        //11. Attach an event handler to the Delete button so that, when clicked, it removes the entire list item (<li>...</li>)
        btn.addEventListener("click", (event) => {
        //12. Finally, use the focus() method to focus the input element, so it's ready for entering the next shopping list item.
          li.remove();
          input.focus();
        });
      });
    </script>
  </body>
</html>
